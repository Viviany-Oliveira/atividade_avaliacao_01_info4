<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .form-container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { margin: 15px 0; }
        .checkbox-group label { display: block; margin: 5px 0; }
        button { background: #28a745; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>📝 Cadastro de Usuário</h2>
        <form method="POST">
            {% csrf_token %}
            <div>
                <label>Nome:</label>
                <input type="text" name="nome" required>
            </div>
            <div>
                <label>CPF:</label>
                <input type="text" name="cpf" required>
            </div>
            <div>
                <label>Data de Nascimento:</label>
                <input type="date" name="data_nascimento" required>
            </div>
            <div class="checkbox-group">
                <label>Ocupação:</label>
                <label><input type="checkbox" name="ocupacao" value="Discente"> Discente</label>
                <label><input type="checkbox" name="ocupacao" value="Docente"> Docente</label>
                <label><input type="checkbox" name="ocupacao" value="Técnico"> Técnico</label>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <br>
        <a href="{% url 'home' %}">← Voltar</a>
    </div>
</body>
</html>
