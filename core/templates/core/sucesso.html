<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: 50px auto; background: #d4edda; color: #155724; padding: 30px; border-radius: 10px; border: 1px solid #c3e6cb; }
        .data { background: white; padding: 20px; border-radius: 5px; margin: 20px 0; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Cadastro Realizado com Sucesso!</h1>
        <div class="data">
            <h3>Dados Cadastrados:</h3>
            <p><strong>Nome:</strong> {{ nome }}</p>
            <p><strong>CPF:</strong> {{ cpf }}</p>
            <p><strong>Data de Nascimento:</strong> {{ data_nascimento }}</p>
            <p><strong>Ocupação:</strong> {{ ocupacao }}</p>
        </div>
        <a href="{% url 'home' %}" class="btn">← Voltar ao Início</a>
    </div>
</body>
</html>
